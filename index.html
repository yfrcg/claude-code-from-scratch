<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Claude Code from Scratch</title>
  <meta name="description" content="从零构建 Claude Code：~4300 行代码的分步教程">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #2563eb;
      --accent-color: #0f766e;
      --warm-color: #d97706;
      --sidebar-width: 260px;
      --sidebar-nav-link-color--active: #2563eb;
      --sidebar-nav-link-border-color--active: #2563eb;
      --code-theme-background: #f6f8fa;
      --code-inline-background: #f0f0f0;
      --table-head-background: #f8fafc;
      --blockquote-border-color: #0f766e;
    }
    /* Dark mode — full docsify-themeable variable override */
    [data-theme="dark"] {
      /* Base */
      --base-background-color: #111827;
      --base-color: #d1d5db;
      --theme-color: #60a5fa;
      --accent-color: #2dd4bf;
      --warm-color: #fbbf24;

      /* Headings */
      --heading-color: #f3f4f6;
      --heading-h1-color: #f9fafb;
      --heading-h1-border-color: #60a5fa;
      --heading-h2-color: #e5e7eb;
      --heading-h2-border-color: #334155;

      /* Links */
      --link-color: #60a5fa;
      --link-color--hover: #2dd4bf;

      /* Sidebar */
      --sidebar-background: #0f172a;
      --sidebar-border-color: #334155;
      --sidebar-name-color: #e5e7eb;
      --sidebar-nav-link-color: #cbd5e1;
      --sidebar-nav-link-color--active: #60a5fa;
      --sidebar-nav-link-color--hover: #2dd4bf;
      --sidebar-nav-link-background--active: rgba(96, 165, 250, 0.10);
      --sidebar-nav-link-background--hover: rgba(45, 212, 191, 0.08);
      --sidebar-nav-link-border-color--active: #60a5fa;
      --sidebar-nav-strong-color: #e2e8f0;
      --sidebar-toggle-icon-color: #cbd5e1;
      --sidebar-toggle-background: #0f172a;

      /* Code */
      --code-theme-background: #0b1220;
      --code-theme-text: #d1d5db;
      --code-theme-keyword: #93c5fd;
      --code-theme-function: #5eead4;
      --code-theme-variable: #fbbf24;
      --code-theme-operator: #67e8f9;
      --code-theme-comment: #94a3b8;
      --code-theme-punctuation: #bfdbfe;
      --code-theme-selector: #86efac;
      --code-theme-tag: #fca5a5;
      --code-theme-selection: rgba(96, 165, 250, 0.18);
      --code-inline-background: #1f2937;
      --code-inline-color: #93c5fd;

      /* Blockquote */
      --blockquote-background: rgba(45, 212, 191, 0.08);
      --blockquote-border-color: #2dd4bf;
      --blockquote-color: #cbd5e1;

      /* Table */
      --table-head-background: #1f2937;
      --table-head-border-color: #334155;
      --table-body-border-color: #334155;
      --table-cell-border-color: #334155;
      --table-row-even-background: #162033;
      --table-row-odd-background: transparent;

      /* Search */
      --search-background: #0f172a;
      --search-input-background-color: #1f2937;
      --search-input-background-color--focus: #243244;
      --search-input-border-color: #334155;
      --search-input-color: #d1d5db;
      --search-input-placeholder-color: #94a3b8;
      --search-result-heading-color: #e5e7eb;
      --search-result-item-color: #cbd5e1;
      --search-result-item-border-color: #334155;
      --search-result-keyword-background: rgba(251, 191, 36, 0.20);
      --search-result-keyword-color: #fbbf24;

      /* Notice / tip boxes */
      --notice-background: rgba(96, 165, 250, 0.08);
      --notice-border-color: #60a5fa;
      --notice-color: #d1d5db;
      --notice-tip-background: rgba(45, 212, 191, 0.08);
      --notice-tip-border-color: #2dd4bf;
      --notice-tip-color: #d1d5db;
      --notice-important-background: rgba(255, 100, 100, 0.06);
      --notice-important-border-color: #ff6b6b;
      --notice-important-color: #ffaaaa;

      /* Copy code button */
      --copycode-background: #334155;
      --copycode-color: #cbd5e1;

      /* HR */
      --hr-border: 1px solid #334155;
    }
    /* Dark mode — elements not covered by CSS variables */
    [data-theme="dark"] .markdown-section h1 { border-bottom-color: #60a5fa; }
    [data-theme="dark"] .markdown-section img { opacity: 0.9; }
    [data-theme="dark"] .docsify-pagination-container { border-top-color: #334155; }
    [data-theme="dark"] .pagination-item-label { color: #94a3b8; }
    [data-theme="dark"] .pagination-item-title { color: #60a5fa; }
    [data-theme="dark"] .lang-switch-btn { background: #1f2937; border-color: #60a5fa; color: #60a5fa; }
    [data-theme="dark"] .lang-switch-btn:hover { background: #2dd4bf; border-color: #2dd4bf; color: #0f172a; }
    [data-theme="dark"] .dark-toggle-btn { background: #1f2937; border-color: #60a5fa; color: #60a5fa; }
    [data-theme="dark"] .dark-toggle-btn:hover { background: #2dd4bf; border-color: #2dd4bf; color: #0f172a; }
    [data-theme="dark"] .back-to-top { background: #1f2937; border-color: #60a5fa; color: #60a5fa; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    [data-theme="dark"] .back-to-top:hover { background: #2dd4bf; border-color: #2dd4bf; color: #0f172a; }
    [data-theme="dark"] .markdown-section pre,
    [data-theme="dark"] .mermaid svg {
      border-color: #334155;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.28);
    }

    body {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .markdown-section h1 { border-bottom: 2px solid #2563eb; padding-bottom: 0.3em; }
    .markdown-section h2 { margin-top: 2.2rem; }
    .markdown-section table {
      display: table;
      width: 100%;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.08);
    }
    .markdown-section th {
      font-weight: 700;
    }
    .markdown-section pre {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    .markdown-section blockquote {
      border-radius: 0 8px 8px 0;
    }
    .markdown-section video {
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.14);
      background: #0f172a;
    }
    .cover-main { max-width: 600px; }
    .cover-main blockquote { font-size: 1em; color: #666; }
    .mermaid {
      text-align: center;
      margin: 1.75rem 0;
    }
    .mermaid svg {
      max-width: 100%;
      height: auto;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      background: var(--base-background-color, #fff);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }

    /* Reading progress bar */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, #2563eb, #0f766e, #d97706);
      z-index: 10000;
      transition: width 0.1s linear;
    }
    [data-theme="dark"] .reading-progress {
      background: linear-gradient(90deg, #60a5fa, #2dd4bf, #fbbf24);
    }

    /* Top-right button group */
    .top-btn-group {
      position: fixed;
      top: 12px;
      right: 100px;
      z-index: 999;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Language switcher button */
    .lang-switch-btn {
      padding: 6px 16px;
      border: 1.5px solid #2563eb;
      border-radius: 20px;
      background: #fff;
      color: #2563eb;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .lang-switch-btn:hover {
      background: #0f766e;
      border-color: #0f766e;
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 3px 12px rgba(15, 118, 110, 0.28);
    }
    .lang-switch-btn:active {
      transform: translateY(0);
      box-shadow: 0 1px 4px rgba(15, 118, 110, 0.2);
    }
    .lang-switch-btn::before {
      content: '\1F310';
      font-size: 14px;
    }

    /* Dark mode toggle button */
    .dark-toggle-btn {
      width: 34px;
      height: 34px;
      border: 1.5px solid #2563eb;
      border-radius: 50%;
      background: #fff;
      color: #2563eb;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }
    .dark-toggle-btn:hover {
      background: #0f766e;
      border-color: #0f766e;
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 3px 12px rgba(15, 118, 110, 0.28);
    }
    .dark-toggle-btn:active {
      transform: translateY(0);
    }

    /* Back to top button */
    .back-to-top {
      position: fixed;
      bottom: 30px;
      right: 24px;
      width: 40px;
      height: 40px;
      border: 1.5px solid #2563eb;
      border-radius: 50%;
      background: #fff;
      color: #2563eb;
      font-size: 18px;
      cursor: pointer;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .back-to-top.visible {
      opacity: 1;
      visibility: visible;
    }
    .back-to-top:hover {
      background: #0f766e;
      border-color: #0f766e;
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(15, 118, 110, 0.28);
    }
  </style>
</head>
<body>
  <!-- Reading progress bar -->
  <div class="reading-progress" id="reading-progress"></div>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Claude Code from Scratch',
      repo: 'https://github.com/yfrcg/claude-code-from-scratch',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: '搜索文档...',
        noData: '没有找到结果',
        depth: 3,
        pathNamespaces: ['/', '/en'],
      },
      coverpage: false,
      alias: {
        '/en/(.*)': '/en/$1',
        '/en/_sidebar.md': '/en/_sidebar.md',
      },
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic',
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
        crossChapter: true,
        crossChapterText: true,
      },
      markdown: {
        renderer: {
          code(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
    }
  </script>
  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    function mermaidConfig() {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      return {
        startOnLoad: false,
        theme: 'base',
        themeVariables: isDark ? {
          background: '#111827',
          primaryColor: '#1f2937',
          primaryTextColor: '#f9fafb',
          primaryBorderColor: '#60a5fa',
          lineColor: '#94a3b8',
          secondaryColor: '#0f766a',
          tertiaryColor: '#78350f',
          clusterBkg: '#0f172a',
          clusterBorder: '#334155',
          noteBkgColor: '#78350f',
          noteTextColor: '#fef3c7'
        } : {
          background: '#ffffff',
          primaryColor: '#dbeafe',
          primaryTextColor: '#111827',
          primaryBorderColor: '#2563eb',
          lineColor: '#475569',
          secondaryColor: '#ccfbf1',
          tertiaryColor: '#fef3c7',
          clusterBkg: '#f8fafc',
          clusterBorder: '#cbd5e1',
          noteBkgColor: '#fef3c7',
          noteTextColor: '#111827'
        }
      };
    }
    mermaid.initialize(mermaidConfig());

    // ==========================================
    // Custom plugins
    // ==========================================
    window.$docsify.plugins = (window.$docsify.plugins || []).concat([
      function(hook) {

        // --- Language switcher (context-aware) ---
        hook.doneEach(function() {
          var group = document.getElementById('top-btn-group');
          if (!group) {
            group = document.createElement('div');
            group.id = 'top-btn-group';
            group.className = 'top-btn-group';
            document.body.appendChild(group);
          }

          // Language button
          var oldLang = document.getElementById('lang-switch');
          if (oldLang) oldLang.remove();

          var hash = location.hash || '#/';
          var path = hash.slice(1);
          var isEn = path.startsWith('/en/') || path === '/en';
          var targetPath, label;

          if (isEn) {
            label = '中文';
            targetPath = path.replace(/^\/en\/?/, '/') || '/';
          } else {
            label = 'English';
            targetPath = (path === '/' || path === '') ? '/en/' : '/en' + path;
          }

          var btn = document.createElement('a');
          btn.id = 'lang-switch';
          btn.className = 'lang-switch-btn';
          btn.href = '#' + targetPath;
          btn.textContent = label;
          group.appendChild(btn);

          // Dark mode button (only create once)
          if (!document.getElementById('dark-toggle')) {
            var darkBtn = document.createElement('button');
            darkBtn.id = 'dark-toggle';
            darkBtn.className = 'dark-toggle-btn';
            darkBtn.title = 'Toggle dark mode';
            var isDark = localStorage.getItem('theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            darkBtn.textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
            darkBtn.addEventListener('click', function() {
              var current = document.documentElement.getAttribute('data-theme');
              var next = current === 'dark' ? 'light' : 'dark';
              document.documentElement.setAttribute('data-theme', next);
              localStorage.setItem('theme', next);
              darkBtn.textContent = next === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
              mermaid.initialize(mermaidConfig());
            });
            group.appendChild(darkBtn);
          }

          // --- Search placeholder language adaptation ---
          setTimeout(function() {
            var searchInput = document.querySelector('.search input[type="search"]');
            if (searchInput) {
              searchInput.placeholder = isEn ? 'Search...' : '搜索文档...';
            }
          }, 100);

          // --- Pagination text language adaptation ---
          if (isEn) {
            var prevLinks = document.querySelectorAll('.pagination-item--previous .pagination-item-label span');
            var nextLinks = document.querySelectorAll('.pagination-item--next .pagination-item-label span');
            prevLinks.forEach(function(el) { if (el.textContent === '上一篇') el.textContent = 'Previous'; });
            nextLinks.forEach(function(el) { if (el.textContent === '下一篇') el.textContent = 'Next'; });
          }
        });

        // --- Mermaid rendering ---
        hook.doneEach(function() {
          mermaid.initialize(mermaidConfig());
          document.querySelectorAll('.mermaid').forEach(function(el) {
            if (el.getAttribute('data-processed')) return;
            var code = el.textContent;
            var id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
            try {
              mermaid.render(id, code).then(function(result) {
                el.innerHTML = result.svg;
                el.setAttribute('data-processed', 'true');
              });
            } catch (e) {
              console.warn('Mermaid render error:', e);
            }
          });
        });
      }
    ]);

    // --- Back to top button ---
    (function() {
      var btn = document.createElement('button');
      btn.className = 'back-to-top';
      btn.title = 'Back to top';
      btn.innerHTML = '&#8593;';
      btn.addEventListener('click', function() {
        var main = document.querySelector('.markdown-section');
        if (main) main.scrollIntoView({ behavior: 'smooth' });
        else window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      document.body.appendChild(btn);

      // Docsify uses the main content area for scrolling
      function getScrollContainer() {
        return document.querySelector('main.content') || document.querySelector('.content') || window;
      }

      var ticking = false;
      function onScroll() {
        if (!ticking) {
          requestAnimationFrame(function() {
            var scrollTop, scrollHeight, clientHeight;
            var container = getScrollContainer();
            if (container === window) {
              scrollTop = window.scrollY;
              scrollHeight = document.documentElement.scrollHeight;
              clientHeight = window.innerHeight;
            } else {
              scrollTop = container.scrollTop;
              scrollHeight = container.scrollHeight;
              clientHeight = container.clientHeight;
            }

            // Back to top visibility
            btn.classList.toggle('visible', scrollTop > 300);

            // Reading progress
            var progress = scrollHeight > clientHeight
              ? (scrollTop / (scrollHeight - clientHeight)) * 100
              : 0;
            var bar = document.getElementById('reading-progress');
            if (bar) bar.style.width = Math.min(progress, 100) + '%';

            ticking = false;
          });
          ticking = true;
        }
      }

      // Attach scroll listener to the right container
      function attachScroll() {
        var container = getScrollContainer();
        (container === window ? window : container).addEventListener('scroll', onScroll, { passive: true });
        onScroll();
      }

      // Re-attach after Docsify renders
      if (window.Docsify) {
        attachScroll();
      } else {
        window.addEventListener('DOMContentLoaded', function() {
          setTimeout(attachScroll, 500);
        });
      }
      // Also listen on window scroll as fallback
      window.addEventListener('scroll', onScroll, { passive: true });
    })();

    // --- Apply saved theme on load ---
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
  <!-- Tabs plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <!-- Code highlight -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
